<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TropRapide · Livreur</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--yellow:#F5C800;--black:#0A0A0A;--dark:#111;--card:#1A1A1A;--border:#2A2A2A;--text:#F0F0F0;--muted:#777;--green:#22C55E;--red:#EF4444;--orange:#F97316;--blue:#3B82F6}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--black);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--dark)}
.login-logo{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--yellow);margin-bottom:6px}
.login-sub{color:var(--muted);font-size:.85rem;margin-bottom:32px}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:26px;width:100%;max-width:360px}
.login-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:18px;text-align:center}
.field{margin-bottom:13px}
.field label{font-size:.73rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px}
.field input,.field select{width:100%;background:var(--dark);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:11px 13px;font-size:.9rem;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--yellow)}
.btn-login{width:100%;padding:13px;background:var(--yellow);color:var(--black);border:none;border-radius:11px;font-size:.95rem;font-weight:800;font-family:'Syne',sans-serif;cursor:pointer;margin-top:4px}
.app{display:none;flex-direction:column;min-height:100vh}
.app-header{background:var(--dark);border-bottom:1px solid var(--border);padding:13px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hname{font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;color:var(--yellow)}
.hrole{font-size:.7rem;color:var(--muted)}
.dtoggle{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--border);border-radius:100px;padding:7px 12px;cursor:pointer}
.ddot{width:8px;height:8px;border-radius:50%}
.ddot.on{background:var(--green);animation:pulse 1.5s infinite}
.ddot.off{background:#444}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
.earn-bar{background:var(--card);border-bottom:1px solid var(--border);padding:13px 18px;display:flex;align-items:center;gap:18px}
.ei{display:flex;flex-direction:column;align-items:center;flex:1}
.ev{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:800}
.ev.y{color:var(--yellow)}.ev.g{color:var(--green)}.ev.b{color:var(--blue)}
.el{font-size:.66rem;color:var(--muted);text-align:center}
.esep{width:1px;height:28px;background:var(--border)}
.section-lbl{padding:13px 16px 6px;font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
.course-wrap{padding:0 14px 90px;display:flex;flex-direction:column;gap:11px}
.cc{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.cc.urg{border-left:4px solid var(--red)}
.cc.mine{border-color:var(--blue)}
.cc.new-a{border-color:var(--yellow);animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(.93);opacity:0}to{transform:scale(1);opacity:1}}
.ch{padding:13px 15px 8px;display:flex;align-items:center;justify-content:space-between}
.cid{font-family:'Syne',sans-serif;font-size:.8rem;font-weight:700;color:var(--yellow)}
.cb{padding:0 15px 15px}
.route{display:flex;align-items:stretch;gap:11px;margin-bottom:11px}
.rdots{display:flex;flex-direction:column;align-items:center;padding-top:3px}
.ds{width:9px;height:9px;border-radius:50%;background:var(--orange);flex-shrink:0}
.dl{width:2px;flex:1;background:var(--border);margin:3px 0}
.de{width:9px;height:9px;border-radius:50%;background:var(--green);flex-shrink:0}
.ri{flex:1}
.rfrom{font-size:.83rem;font-weight:600;margin-bottom:1px}
.rfrom-s{font-size:.73rem;color:var(--muted);margin-bottom:9px}
.rto{font-size:.83rem;font-weight:600;margin-bottom:1px}
.rto-s{font-size:.73rem;color:var(--muted)}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.chip{background:var(--dark);border-radius:6px;padding:3px 9px;font-size:.73rem}
.chip.comm{background:rgba(34,197,94,.12);color:var(--green)}
.cactions{display:flex;gap:7px}
.btn{padding:11px 14px;border-radius:11px;font-size:.82rem;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;justify-content:center;transition:all .15s}
.btn:active{transform:scale(.96)}
.btn-take{background:var(--yellow);color:var(--black);flex:1}
.btn-done{background:var(--green);color:#fff;flex:1}
.btn-nav{background:rgba(59,130,246,.12);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
.btn-call{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.btn-pass{background:rgba(255,255,255,.05);color:var(--muted)}
.cbadge{padding:3px 9px;border-radius:100px;font-size:.68rem;font-weight:700}
.cbadge.dispo{background:rgba(245,200,0,.15);color:var(--yellow);border:1px solid rgba(245,200,0,.3)}
.cbadge.mine{background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.3)}
.cbadge.urg{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.cbadge.livree{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.alert-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.87);backdrop-filter:blur(6px);z-index:200;align-items:flex-end;justify-content:center}
.alert-overlay.show{display:flex}
.sheet{background:var(--card);border:2px solid var(--yellow);border-radius:22px 22px 0 0;padding:24px 22px 34px;width:100%;max-width:480px;animation:sup .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh{width:38px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.semoji{font-size:2.8rem;text-align:center;margin-bottom:7px}
.stitle{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;color:var(--yellow);text-align:center;margin-bottom:3px}
.ssub{font-size:.82rem;color:var(--muted);text-align:center;margin-bottom:16px}
.sdetail{background:var(--dark);border-radius:11px;padding:13px;margin-bottom:16px}
.srow{display:flex;justify-content:space-between;padding:5px 0;font-size:.82rem}
.srow:not(:last-child){border-bottom:1px solid var(--border)}
.srow .sl{color:var(--muted)}.srow .sv{font-weight:600;text-align:right;max-width:62%}
.sbtns{display:flex;gap:9px}
.sbtns .btn{flex:1;padding:13px}
.toast-wrap{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:7px;width:calc(100% - 28px);max-width:380px}
.toast{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px 15px;display:flex;align-items:center;gap:9px;animation:tdrop .3s ease;box-shadow:0 4px 18px rgba(0,0,0,.4)}
.toast.s{border-left:3px solid var(--green)}.toast.w{border-left:3px solid var(--yellow)}.toast.e{border-left:3px solid var(--red)}
@keyframes tdrop{from{transform:translateY(-14px);opacity:0}to{transform:translateY(0);opacity:1}}
.t-ico{font-size:1.1rem}.t-txt{font-size:.81rem;font-weight:600}
.empty{text-align:center;padding:46px 18px;color:var(--muted)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--dark);border-top:1px solid var(--border);display:flex;padding:9px 0 18px}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.ni-ico{font-size:1.2rem}.ni-lbl{font-size:.65rem;color:var(--muted)}
.ni.active .ni-lbl{color:var(--yellow)}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-logo">🛵 TROPRAPIDE</div>
  <div class="login-sub">Espace Livreur</div>
  <div class="login-card">
    <div class="login-title">🔥 Connexion</div>
    <div class="field"><label>Database URL Firebase</label>
      <input type="text" id="c_dburl" placeholder="https://troprapide-xxx.firebaseio.com"></div>
    <div class="field"><label>API Key</label>
      <input type="text" id="c_apikey" placeholder="AIzaSy..."></div>
    <div class="field"><label>Project ID</label>
      <input type="text" id="c_projectid" placeholder="troprapide-xxxxx"></div>
    <div class="field"><label>Votre nom</label>
      <select id="c_name">
        <option>Mamadou T.</option><option>Kouassi B.</option>
        <option>Ibrahim D.</option><option>Sékou A.</option><option>Narcisse K.</option>
      </select>
    </div>
    <div class="field"><label>Zone principale</label>
      <select id="c_zone">
        <option>Cocody</option><option>Plateau</option><option>Yopougon</option>
        <option>Marcory</option><option>Treichville</option><option>Adjamé</option><option>Abobo</option><option>Koumassi</option>
      </select>
    </div>
    <button class="btn-login" onclick="connectFirebase()">🛵 PRENDRE LA ROUTE →</button>
    <div style="font-size:.72rem;color:var(--muted);margin-top:10px;text-align:center">Mêmes infos Firebase que l'admin</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="appScreen">
  <div class="app-header">
    <div><div class="hname" id="hName">Livreur</div><div class="hrole">🛵 TropRapide · Espace Livreur</div></div>
    <div class="dtoggle" onclick="toggleDispo()"><div class="ddot on" id="dispoDot"></div><span id="dispoLabel" style="font-size:.78rem;font-weight:600">Disponible</span></div>
  </div>
  <div class="earn-bar">
    <div class="ei"><div class="ev y" id="e-courses">0</div><div class="el">Courses<br>aujourd'hui</div></div>
    <div class="esep"></div>
    <div class="ei"><div class="ev g" id="e-fcfa">0</div><div class="el">FCFA<br>gagnés</div></div>
    <div class="esep"></div>
    <div class="ei"><div class="ev b" id="e-dispo">0</div><div class="el">Courses<br>disponibles</div></div>
  </div>
  <div class="section-lbl">Courses disponibles</div>
  <div class="course-wrap" id="courseWrap"></div>
  <div class="bottom-nav">
    <div class="ni active"><div class="ni-ico">🛵</div><div class="ni-lbl">Courses</div></div>
    <div class="ni"><div class="ni-ico">💰</div><div class="ni-lbl">Gains</div></div>
    <div class="ni" onclick="logout()"><div class="ni-ico">🚪</div><div class="ni-lbl">Quitter</div></div>
  </div>
</div>

<div class="alert-overlay" id="alertOverlay">
  <div class="sheet">
    <div class="sh"></div>
    <div class="semoji">🛵</div>
    <div class="stitle">Nouvelle course !</div>
    <div class="ssub" id="shSub"></div>
    <div class="sdetail" id="shDetail"></div>
    <div class="sbtns">
      <button class="btn btn-take" onclick="takeFromAlert()">🛵 Prendre la course</button>
      <button class="btn btn-pass" onclick="closeAlert()">Passer</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="tw"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, update } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const CFG_KEY = 'troprapide_livreur_cfg';
let db = null, myName = '', myZone = '', isDispo = true;
let orders = {}, alertPending = null;
let prevAvailCount = 0, coursesToday = 0, fcfaToday = 0;

window.connectFirebase = function() {
  const dburl = document.getElementById('c_dburl').value.trim();
  const apiKey = document.getElementById('c_apikey').value.trim();
  const projectId = document.getElementById('c_projectid').value.trim();
  const name = document.getElementById('c_name').value;
  const zone = document.getElementById('c_zone').value;
  if (!dburl||!apiKey||!projectId) { alert('Remplissez tous les champs !'); return; }
  const cfg = {dburl,apiKey,projectId,name,zone};
  localStorage.setItem(CFG_KEY, JSON.stringify(cfg));
  initApp(cfg);
};

function initApp(cfg) {
  myName=cfg.name; myZone=cfg.zone;
  const app = initializeApp({apiKey:cfg.apiKey,databaseURL:cfg.dburl,projectId:cfg.projectId}, 'livreur-'+Date.now());
  db = getDatabase(app);
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').style.display='flex';
  document.getElementById('hName').textContent=myName;
  startListening();
  requestNotifPermission();
}

function startListening() {
  onValue(ref(db,'orders'), snap => {
    orders = snap.val() || {};
    const available = Object.entries(orders).filter(([k,v]) =>
      (v.status==='nouvelle'||v.status==='prete') && v.livreur !== myName
    );
    if (isDispo && available.length > prevAvailCount) {
      const newest = available[available.length-1];
      showAlert({...newest[1], _key:newest[0]});
      playBeep();
      sendNotif(newest[1]);
    }
    prevAvailCount = available.length;
    document.getElementById('e-dispo').textContent = available.length;
    renderCourses();
  });
}

function renderCourses() {
  const all = Object.entries(orders).map(([k,v])=>({...v,_key:k}));
  const available = all.filter(o=>(o.status==='nouvelle'||o.status==='prete')&&o.livreur!==myName);
  const mine = all.filter(o=>o.livreur===myName&&o.status==='en-route');
  const list = [...mine, ...available].sort((a,b)=>b.createdAt-a.createdAt);

  const wrap = document.getElementById('courseWrap');
  if (!list.length) {
    wrap.innerHTML=`<div class="empty">🛵<br><br>Aucune course disponible.<br><span style="font-size:.8rem">Restez disponible, ça va arriver !</span></div>`;
    return;
  }
  const TYPES={repas:{e:'🍽',l:'Repas'},colis:{e:'📦',l:'Colis'},courses:{e:'🛒',l:'Courses'},medicaments:{e:'💊',l:'Médic.'},documents:{e:'📄',l:'Docs'},entreprise:{e:'🏢',l:'Entrep.'}};
  const PAYLBL={cash:'💵 Cash',momo:'📱 MoMo',wave:'🌊 Wave',prepaye:'✅ Prépayé'};
  wrap.innerHTML = list.map(o => {
    const isMine = o.livreur===myName;
    const elapsed = Math.floor((Date.now()-o.createdAt)/60000);
    const cfg = TYPES[o.type]||TYPES.repas;
    const comm = Math.max(500, Math.round(Number(o.amount)*0.1/100)*100);
    return `<div class="cc ${o.priority==='urgente'?'urg':''} ${isMine?'mine':''} ${o.isNew&&!isMine?'new-a':''}">
      <div class="ch">
        <div>
          <div class="cid">#${o._key.slice(-6).toUpperCase()} <span style="font-size:.68rem;font-weight:400;color:var(--muted)">${cfg.e} ${cfg.l}</span></div>
          <div style="font-size:.7rem;color:var(--muted)">il y a ${elapsed} min</div>
        </div>
        <div style="display:flex;gap:5px">
          ${o.priority==='urgente'?'<span class="cbadge urg">🔴 URGENT</span>':''}
          <span class="cbadge ${isMine?'mine':(o.status==='livree'?'livree':'dispo')}">${isMine?'🔵 Ma course':(o.status==='prete'?'🍽 Prête':'🟡 Dispo')}</span>
        </div>
      </div>
      <div class="cb">
        <div class="route">
          <div class="rdots"><div class="ds"></div><div class="dl"></div><div class="de"></div></div>
          <div class="ri">
            <div class="rfrom">${o.restaurant}</div>
            <div class="rfrom-s">📦 Récupérer la commande</div>
            <div class="rto">Zone ${o.zone}</div>
            <div class="rto-s">👤 ${o.client} · ${o.phone}</div>
          </div>
        </div>
        <div class="chips">
          <span class="chip">💰 ${Number(o.amount).toLocaleString()} FCFA</span>
          <span class="chip comm">🛵 ~${comm.toLocaleString()} FCFA commission</span>
          <span class="chip">${PAYLBL[o.paiement]||''}</span>
          <span class="chip">${o.items.substring(0,32)}${o.items.length>32?'...':''}</span>
          ${o.notes?`<span class="chip">📝 ${o.notes}</span>`:''}
        </div>
        <div class="cactions">
          ${!isMine?`<button class="btn btn-take" onclick="takeCourse('${o._key}',${comm})">🛵 Prendre</button>`:''}
          ${isMine?`<button class="btn btn-done" onclick="markDone('${o._key}',${comm})">✅ Livré !</button>`:''}
          ${isMine?`<button class="btn btn-nav" onclick="navigate('${o.zone}')">🗺</button>`:''}
          <button class="btn btn-call" onclick="callClient('${o.phone}')">📞</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

window.takeCourse = async function(key, comm) {
  if (!db) return;
  await update(ref(db,'orders/'+key), {livreur:myName, status:'en-route'});
  toast('🛵 Course prise ! En route','s');
};

window.markDone = async function(key, comm) {
  if (!db) return;
  await update(ref(db,'orders/'+key), {status:'livree'});
  coursesToday++;
  fcfaToday+=comm;
  document.getElementById('e-courses').textContent=coursesToday;
  document.getElementById('e-fcfa').textContent=fcfaToday.toLocaleString();
  toast(`✅ Livré ! +${comm.toLocaleString()} FCFA`,'s');
};

window.navigate = function(zone) { window.open(`https://www.google.com/maps/search/${encodeURIComponent(zone+' Abidjan')}`,'_blank'); };
window.callClient = function(phone) { window.open(`tel:${phone}`,'_self'); };

window.toggleDispo = function() {
  isDispo=!isDispo;
  document.getElementById('dispoDot').className='ddot '+(isDispo?'on':'off');
  document.getElementById('dispoLabel').textContent=isDispo?'Disponible':'Pause';
  toast(isDispo?'🟢 Vous êtes disponible':'⏸ En pause', isDispo?'s':'w');
};

function showAlert(o) {
  alertPending=o;
  const comm=Math.max(500,Math.round(Number(o.amount)*0.1/100)*100);
  document.getElementById('shSub').textContent=`Zone: ${o.zone} · ${new Date(o.createdAt).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}`;
  document.getElementById('shDetail').innerHTML=`
    <div class="srow"><span class="sl">Restaurant</span><span class="sv">${o.restaurant}</span></div>
    <div class="srow"><span class="sl">Livraison</span><span class="sv">📍 ${o.zone}</span></div>
    <div class="srow"><span class="sl">Commande</span><span class="sv">${o.items.substring(0,40)}</span></div>
    <div class="srow"><span class="sl">Commission</span><span class="sv" style="color:var(--green)">~${comm.toLocaleString()} FCFA 💰</span></div>
    <div class="srow"><span class="sl">Paiement</span><span class="sv">${{cash:'💵 Cash',momo:'📱 MoMo',wave:'🌊 Wave',prepaye:'✅ Prépayé'}[o.paiement]||''}</span></div>
    <div class="srow"><span class="sl">Priorité</span><span class="sv">${o.priority==='urgente'?'🔴 URGENTE':'🟢 Normale'}</span></div>
  `;
  document.getElementById('alertOverlay').classList.add('show');
}
window.closeAlert=function(){document.getElementById('alertOverlay').classList.remove('show');};
window.takeFromAlert=function(){
  if(alertPending){const comm=Math.max(500,Math.round(Number(alertPending.amount)*0.1/100)*100);takeCourse(alertPending._key,comm);}
  closeAlert();
};

function playBeep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[660,0],[880,.18],[1100,.36]].forEach(([f,t])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;o.type='sine';
      g.gain.setValueAtTime(0,ctx.currentTime+t);
      g.gain.linearRampToValueAtTime(.3,ctx.currentTime+t+.05);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+t+.14);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.15);
    });
  }catch(e){}
}
function requestNotifPermission(){if('Notification'in window&&Notification.permission==='default')Notification.requestPermission();}
function sendNotif(o){if('Notification'in window&&Notification.permission==='granted')new Notification('🛵 Nouvelle course',{body:`${o.restaurant} → ${o.zone}`});}
function toast(msg,type='s'){
  const w=document.getElementById('tw'),el=document.createElement('div');
  el.className=`toast ${type}`;el.innerHTML=`<span class="t-ico">${{s:'✅',w:'⚠️',e:'❌'}[type]||'📢'}</span><span class="t-txt">${msg}</span>`;
  w.prepend(el);setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';},2800);setTimeout(()=>el.remove(),3200);
}
window.logout=function(){localStorage.removeItem(CFG_KEY);location.reload();};

const saved=localStorage.getItem(CFG_KEY);
if(saved){try{initApp(JSON.parse(saved));}catch(e){}}
</script>
</body>
</html>
