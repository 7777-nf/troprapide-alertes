<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TropRapide · Restaurant</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--yellow:#F5C800;--black:#0A0A0A;--dark:#111;--card:#1A1A1A;--border:#2A2A2A;--text:#F0F0F0;--muted:#777;--green:#22C55E;--red:#EF4444;--orange:#F97316;--blue:#3B82F6}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--black);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--dark)}
.login-logo{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--yellow);margin-bottom:6px}
.login-sub{color:var(--muted);font-size:.85rem;margin-bottom:32px}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:26px;width:100%;max-width:360px}
.login-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:18px;text-align:center}
.field{margin-bottom:13px}
.field label{font-size:.73rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px}
.field input,.field select{width:100%;background:var(--dark);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:11px 13px;font-size:.9rem;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--yellow)}
.btn-login{width:100%;padding:13px;background:var(--yellow);color:var(--black);border:none;border-radius:11px;font-size:.95rem;font-weight:800;font-family:'Syne',sans-serif;cursor:pointer;margin-top:4px}
.app{display:none;flex-direction:column;min-height:100vh}
.app-header{background:var(--dark);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hname{font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;color:var(--yellow)}
.hrole{font-size:.7rem;color:var(--muted)}
.otoggle{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--border);border-radius:100px;padding:7px 13px;cursor:pointer}
.tdot{width:8px;height:8px;border-radius:50%;transition:background .3s}
.tdot.on{background:var(--green);animation:pulse 1.5s infinite}
.tdot.off{background:#444}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;padding:14px}
.sbox{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px;text-align:center}
.snum{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800}
.snum.y{color:var(--yellow)}.snum.o{color:var(--orange)}.snum.g{color:var(--green)}
.slbl{font-size:.68rem;color:var(--muted);margin-top:2px}
.tabs{display:flex;gap:7px;padding:0 14px 12px;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 16px;border-radius:100px;border:1px solid var(--border);font-size:.78rem;font-weight:600;white-space:nowrap;cursor:pointer;color:var(--muted);transition:all .2s;flex-shrink:0}
.tab.active{background:var(--yellow);color:var(--black);border-color:var(--yellow)}
.orders-wrap{padding:0 14px 90px;display:flex;flex-direction:column;gap:11px}
.oc{background:var(--card);border:1px solid var(--border);border-radius:15px;overflow:hidden}
.oc.new-a{border-color:var(--yellow);animation:pop .4s cubic-bezier(.34,1.56,.64,1),gb 2s ease 3}
@keyframes pop{from{transform:scale(.93);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes gb{0%,100%{border-color:var(--yellow)}50%{border-color:rgba(245,200,0,.2)}}
.oc.urg{border-left:4px solid var(--red)}
.oh{padding:13px 15px 8px;display:flex;align-items:center;justify-content:space-between}
.oid{font-family:'Syne',sans-serif;font-size:.8rem;font-weight:700;color:var(--yellow)}
.ob{padding:0 15px 14px}
.oitems-title{font-weight:600;font-size:.92rem;margin-bottom:3px}
.oitems{font-size:.8rem;color:var(--muted);margin-bottom:9px}
.ochips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:11px}
.chip{background:var(--dark);border-radius:6px;padding:4px 9px;font-size:.73rem}
.chip.urg{background:rgba(239,68,68,.12);color:var(--red)}
.oactions{display:flex;gap:7px;flex-wrap:wrap}
.btn{padding:10px 15px;border-radius:10px;font-size:.82rem;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;justify-content:center}
.btn:active{transform:scale(.97)}
.btn-acc{background:var(--yellow);color:var(--black);flex:1}
.btn-rdy{background:var(--green);color:#fff;flex:1}
.btn-wa{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.btn-ref{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.sb{padding:4px 10px;border-radius:100px;font-size:.69rem;font-weight:700}
.sb.nouvelle{background:rgba(245,200,0,.15);color:var(--yellow);border:1px solid rgba(245,200,0,.3)}
.sb.acceptee{background:rgba(249,115,22,.15);color:var(--orange);border:1px solid rgba(249,115,22,.3)}
.sb.prete{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.sb.en-route{background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.3)}
.sb.livree{background:rgba(255,255,255,.05);color:var(--muted)}
.alert-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.87);backdrop-filter:blur(6px);z-index:200;align-items:flex-end;justify-content:center}
.alert-overlay.show{display:flex}
.sheet{background:var(--card);border:2px solid var(--yellow);border-radius:22px 22px 0 0;padding:24px 22px 34px;width:100%;max-width:480px;animation:sup .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh{width:38px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.semoji{font-size:2.8rem;text-align:center;margin-bottom:7px}
.stitle{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;color:var(--yellow);text-align:center;margin-bottom:3px}
.ssub{font-size:.82rem;color:var(--muted);text-align:center;margin-bottom:16px}
.sdetail{background:var(--dark);border-radius:11px;padding:13px;margin-bottom:16px}
.srow{display:flex;justify-content:space-between;padding:5px 0;font-size:.82rem}
.srow:not(:last-child){border-bottom:1px solid var(--border)}
.srow .sl{color:var(--muted)}.srow .sv{font-weight:600;text-align:right;max-width:62%}
.sbtns{display:flex;gap:9px}
.sbtns .btn{flex:1;padding:13px}
.toast-wrap{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:7px;width:calc(100% - 28px);max-width:380px}
.toast{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px 15px;display:flex;align-items:center;gap:9px;animation:tdrop .3s ease;box-shadow:0 4px 18px rgba(0,0,0,.4)}
.toast.s{border-left:3px solid var(--green)}.toast.w{border-left:3px solid var(--yellow)}.toast.e{border-left:3px solid var(--red)}
@keyframes tdrop{from{transform:translateY(-14px);opacity:0}to{transform:translateY(0);opacity:1}}
.t-ico{font-size:1.1rem}.t-txt{font-size:.81rem;font-weight:600}
.empty{text-align:center;padding:46px 18px;color:var(--muted)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--dark);border-top:1px solid var(--border);display:flex;padding:9px 0 18px}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.ni-ico{font-size:1.2rem}.ni-lbl{font-size:.65rem;color:var(--muted)}
.ni.active .ni-lbl{color:var(--yellow)}
/* Firebase config on restaurant */
.cfg-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--dark)}
.cfg-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:26px;width:100%;max-width:360px}
</style>
</head>
<body>

<!-- FIREBASE CONFIG -->
<div class="cfg-screen" id="cfgScreen">
  <div class="login-logo">🍽 TROPRAPIDE</div>
  <div class="login-sub">Espace Restaurant</div>
  <div class="cfg-card">
    <div class="login-title">🔥 Connexion Firebase</div>
    <div class="field"><label>Database URL Firebase</label>
      <input type="text" id="c_dburl" placeholder="https://troprapide-xxx.firebaseio.com"></div>
    <div class="field"><label>API Key</label>
      <input type="text" id="c_apikey" placeholder="AIzaSy..."></div>
    <div class="field"><label>Project ID</label>
      <input type="text" id="c_projectid" placeholder="troprapide-xxxxx"></div>
    <div class="field"><label>Votre restaurant</label>
      <select id="c_resto">
        <option>Le Palais du Poulet</option><option>Saveurs du Soleil</option>
        <option>Pizza House Abidjan</option><option>Street Burger Corner</option>
        <option>Délices Asiatiques</option><option>Juice & Smoothies Bar</option>
      </select>
    </div>
    <button class="btn-login" onclick="connectFirebase()">🔥 SE CONNECTER →</button>
    <div style="font-size:.72rem;color:var(--muted);margin-top:10px;text-align:center">Saisissez les mêmes infos que l'admin</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="appScreen">
  <div class="app-header">
    <div><div class="hname" id="hRestoName">Restaurant</div><div class="hrole">🍽 TropRapide · Espace Restaurant</div></div>
    <div class="otoggle" onclick="toggleOnline()"><div class="tdot on" id="onlineDot"></div><span id="onlineLabel" style="font-size:.79rem;font-weight:600">Ouvert</span></div>
  </div>
  <div class="stats-row">
    <div class="sbox"><div class="snum y" id="s-new">0</div><div class="slbl">Nouvelles</div></div>
    <div class="sbox"><div class="snum o" id="s-prep">0</div><div class="slbl">En prépa</div></div>
    <div class="sbox"><div class="snum g" id="s-done">0</div><div class="slbl">Livrées</div></div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="filter('all',this)">Toutes</div>
    <div class="tab" onclick="filter('nouvelle',this)">🔴 Nouvelles</div>
    <div class="tab" onclick="filter('acceptee',this)">En prépa</div>
    <div class="tab" onclick="filter('prete',this)">Prêtes</div>
    <div class="tab" onclick="filter('livree',this)">Livrées</div>
  </div>
  <div class="orders-wrap" id="orderWrap"></div>
  <div class="bottom-nav">
    <div class="ni active"><div class="ni-ico">📋</div><div class="ni-lbl">Commandes</div></div>
    <div class="ni"><div class="ni-ico">📊</div><div class="ni-lbl">Stats</div></div>
    <div class="ni" onclick="logout()"><div class="ni-ico">🚪</div><div class="ni-lbl">Quitter</div></div>
  </div>
</div>

<div class="alert-overlay" id="alertOverlay">
  <div class="sheet">
    <div class="sh"></div>
    <div class="semoji">🔔</div>
    <div class="stitle">Nouvelle commande !</div>
    <div class="ssub" id="shSub"></div>
    <div class="sdetail" id="shDetail"></div>
    <div class="sbtns">
      <button class="btn btn-acc" onclick="acceptFromAlert()">✓ Accepter</button>
      <button class="btn btn-wa" onclick="waFromAlert()">💬 WA</button>
      <button class="btn btn-ref" onclick="closeAlert()">✕</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="tw"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, update } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const CFG_KEY = 'troprapide_resto_cfg';
let db = null, myResto = '', isOnline = true;
let orders = {}, alertPending = null, currentFilter = 'all';
let prevNewCount = 0;
const PAYLBL = {cash:'💵 Cash',momo:'📱 Mobile Money',wave:'🌊 Wave',prepaye:'✅ Prépayé'};

window.connectFirebase = function() {
  const dburl = document.getElementById('c_dburl').value.trim();
  const apiKey = document.getElementById('c_apikey').value.trim();
  const projectId = document.getElementById('c_projectid').value.trim();
  const resto = document.getElementById('c_resto').value;
  if (!dburl||!apiKey||!projectId) { alert('Remplissez tous les champs !'); return; }
  const cfg = {dburl,apiKey,projectId,resto};
  localStorage.setItem(CFG_KEY, JSON.stringify(cfg));
  initApp(cfg);
};

function initApp(cfg) {
  myResto = cfg.resto;
  const app = initializeApp({apiKey:cfg.apiKey,databaseURL:cfg.dburl,projectId:cfg.projectId}, 'resto-'+Date.now());
  db = getDatabase(app);
  document.getElementById('cfgScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'flex';
  document.getElementById('hRestoName').textContent = myResto;
  startListening();
  requestNotifPermission();
}

function startListening() {
  onValue(ref(db,'orders'), snap => {
    orders = snap.val() || {};
    const myOrders = Object.entries(orders).filter(([k,v]) => v.restaurant === myResto);
    const newOnes = myOrders.filter(([k,v]) => v.status === 'nouvelle');
    if (newOnes.length > prevNewCount) {
      const latest = newOnes[newOnes.length-1];
      showAlert({...latest[1], _key: latest[0]});
      playBeep();
      sendNotif(latest[1]);
    }
    prevNewCount = newOnes.length;
    renderOrders();
  });
}

function renderOrders() {
  const myList = Object.entries(orders)
    .filter(([k,v]) => v.restaurant === myResto)
    .map(([k,v]) => ({...v,_key:k}))
    .sort((a,b) => b.createdAt - a.createdAt);

  const filtered = currentFilter === 'all' ? myList : myList.filter(o => o.status === currentFilter);
  const wrap = document.getElementById('orderWrap');

  document.getElementById('s-new').textContent = myList.filter(o=>o.status==='nouvelle').length;
  document.getElementById('s-prep').textContent = myList.filter(o=>o.status==='acceptee'||o.status==='prete').length;
  document.getElementById('s-done').textContent = myList.filter(o=>o.status==='livree').length;

  if (!filtered.length) {
    wrap.innerHTML = `<div class="empty">🍽<br><br>Aucune commande ici.<br><span style="font-size:.8rem">Les commandes apparaîtront ici en temps réel</span></div>`;
    return;
  }
  const SL = {nouvelle:'🔴 Nouvelle',acceptee:'🟠 En prépa',prete:'🟢 Prête','en-route':'🔵 En route',livree:'✅ Livrée'};
  wrap.innerHTML = filtered.map(o => {
    const elapsed = Math.floor((Date.now()-o.createdAt)/60000);
    return `<div class="oc ${o.isNew?'new-a':''} ${o.priority==='urgente'?'urg':''}">
      <div class="oh">
        <div><div class="oid">#${o._key.slice(-6).toUpperCase()}</div><div style="font-size:.7rem;color:var(--muted)">il y a ${elapsed} min</div></div>
        <span class="sb ${o.status}">${SL[o.status]||o.status}</span>
      </div>
      <div class="ob">
        <div class="oitems-title">Commande</div>
        <div class="oitems">${o.items}</div>
        <div class="ochips">
          <span class="chip">👤 ${o.client}</span>
          <span class="chip">📍 ${o.zone}</span>
          <span class="chip">💰 ${Number(o.amount).toLocaleString()} FCFA</span>
          <span class="chip">${PAYLBL[o.paiement]||''}</span>
          ${o.priority==='urgente'?'<span class="chip urg">🔴 URGENT</span>':''}
          ${o.notes?`<span class="chip">📝 ${o.notes}</span>`:''}
        </div>
        <div class="oactions">
          ${o.status==='nouvelle'?`<button class="btn btn-acc" onclick="updateS('${o._key}','acceptee')">✓ Accepter & Préparer</button><button class="btn btn-ref" onclick="updateS('${o._key}','refuse')">✕</button>`:''}
          ${o.status==='acceptee'?`<button class="btn btn-rdy" onclick="updateS('${o._key}','prete')">🍽 Commande Prête !</button>`:''}
          ${o.status==='prete'?`<span style="color:var(--green);font-size:.8rem;font-weight:600">✅ En attente du livreur</span>`:''}
          ${o.status==='livree'?`<span style="color:var(--muted);font-size:.8rem">Livraison confirmée</span>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

window.updateS = async function(key, status) {
  if (!db) return;
  await update(ref(db,'orders/'+key), {status});
  toast({acceptee:'✓ Commande acceptée',prete:'🍽 Prête !',refuse:'Commande refusée'}[status]||'Mis à jour', status==='refuse'?'e':'s');
};

window.filter = function(s,el) {
  currentFilter=s;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderOrders();
};

window.toggleOnline = function() {
  isOnline=!isOnline;
  document.getElementById('onlineDot').className='tdot '+(isOnline?'on':'off');
  document.getElementById('onlineLabel').textContent=isOnline?'Ouvert':'Fermé';
  toast(isOnline?'🟢 En ligne':'🔴 Hors ligne', isOnline?'s':'e');
};

function showAlert(o) {
  alertPending=o;
  document.getElementById('shSub').textContent=`${o.restaurant} · ${new Date(o.createdAt).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}`;
  document.getElementById('shDetail').innerHTML=`
    <div class="srow"><span class="sl">Commande</span><span class="sv">${o.items}</span></div>
    <div class="srow"><span class="sl">Client</span><span class="sv">${o.client}</span></div>
    <div class="srow"><span class="sl">Zone</span><span class="sv">📍 ${o.zone}</span></div>
    <div class="srow"><span class="sl">Montant</span><span class="sv">${Number(o.amount).toLocaleString()} FCFA</span></div>
    <div class="srow"><span class="sl">Paiement</span><span class="sv">${PAYLBL[o.paiement]||''}</span></div>
    ${o.notes?`<div class="srow"><span class="sl">Notes</span><span class="sv">${o.notes}</span></div>`:''}
    <div class="srow"><span class="sl">Priorité</span><span class="sv">${o.priority==='urgente'?'🔴 URGENTE':'🟢 Normale'}</span></div>
  `;
  document.getElementById('alertOverlay').classList.add('show');
}
window.closeAlert = function() { document.getElementById('alertOverlay').classList.remove('show'); };
window.acceptFromAlert = function() { if(alertPending) updateS(alertPending._key,'acceptee'); closeAlert(); };
window.waFromAlert = function() {
  if (!alertPending) return;
  const o=alertPending;
  const msg=encodeURIComponent(`✅ COMMANDE ACCEPTÉE\n${o.items}\n💰 ${o.amount} FCFA\n📍 ${o.zone}\n👤 ${o.client} — ${o.phone}`);
  window.open(`https://wa.me/2250140503030?text=${msg}`,'_blank');
  closeAlert();
};

function playBeep() {
  try {
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[880,0],[1100,.18],[880,.36],[1320,.54]].forEach(([f,t])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;o.type='sine';
      g.gain.setValueAtTime(0,ctx.currentTime+t);
      g.gain.linearRampToValueAtTime(.32,ctx.currentTime+t+.05);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+t+.14);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.15);
    });
  }catch(e){}
}
function requestNotifPermission(){if('Notification'in window&&Notification.permission==='default')Notification.requestPermission();}
function sendNotif(o){if('Notification'in window&&Notification.permission==='granted')new Notification(`🔔 Nouvelle commande`,{body:`${o.items} · ${o.zone}`});}
function toast(msg,type='s'){
  const w=document.getElementById('tw'),el=document.createElement('div');
  el.className=`toast ${type}`;el.innerHTML=`<span class="t-ico">${{s:'✅',w:'⚠️',e:'❌'}[type]||'📢'}</span><span class="t-txt">${msg}</span>`;
  w.prepend(el);setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';},2800);setTimeout(()=>el.remove(),3200);
}
window.logout=function(){localStorage.removeItem(CFG_KEY);location.reload();};

const saved=localStorage.getItem(CFG_KEY);
if(saved){try{initApp(JSON.parse(saved));}catch(e){}}
</script>
</body>
</html>
